site_name: pearl-kit
site_description: Pixel-craft PySide6/QML component kit — macOS first
site_url: https://omerdduran.github.io/pearl-kit
repo_url: https://github.com/omerdduran/pearl-kit
repo_name: omerdduran/pearl-kit

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tokens: tokens.md
  - Components:
      - Button: components/button.md
      - Input: components/input.md
      - TextArea: components/textarea.md
      - Toggle: components/toggle.md
      - Select: components/select.md
      - Dialog: components/dialog.md
      - MessageBox: components/message-box.md
      - CheckBox: components/checkbox.md
      - Stepper: components/stepper.md
      - PearlText: components/pearl-text.md
      - GroupBox: components/group-box.md
      - Separator: components/separator.md
      - Card: components/card.md
      - FormRow: components/form-row.md
      - Splitter: components/splitter.md
      - ScrollArea: components/scroll-area.md
      - ProgressBar: components/progress-bar.md
      - Spinner: components/spinner.md
      - StatusBar: components/statusbar.md
      - Tooltip: components/tooltip.md
      - Toast: components/toast.md
      - Slider: components/slider.md
      - StackedView: components/stacked-view.md
      - TabBar: components/tabbar.md
      - NavItem: components/nav-item.md
      - IconStrip: components/icon-strip.md
      - Menu: components/menu.md
      - Avatar: components/avatar.md
      - DetachableTabView: components/detachable-tabs.md
      - Badge: components/badge.md
      - CodeBlock: components/code-block.md
      - ListView: components/list-view.md
  - Experimental:
      - Overview: experimental.md
      - StatusPill: components/status-pill.md
      - SectionLabel: components/section-label.md
      - MetaRow: components/meta-row.md
      - FilterRow: components/filter-row.md
      - InfoCard: components/info-card.md
      - SystemInfoGrid: components/system-info-grid.md
      - TopMetaStrip: components/top-meta-strip.md
      - BrandTile: components/brand-tile.md
      - ScannerMark: components/scanner-mark.md
      - Thumb: components/thumb.md
      - Render3D: components/render-3d.md
      - ProgressLine: components/progress-line.md
      - SearchField: components/search-field.md
      - Breadcrumb: components/breadcrumb.md
      - SegmentedControl: components/segmented-control.md
      - SaveIndicator: components/save-indicator.md
      - PatientStrip: components/patient-strip.md
      - StatTile: components/stat-tile.md
      - DataTable: components/data-table.md
      - Chip: components/chip.md
      - ToolButton: components/tool-button.md
      - Viewport2D: components/viewport-2d.md
      - OrientationCube: components/orientation-cube.md
      - DensityBar: components/density-bar.md
      - SafetyRow: components/safety-row.md
      - SubjectRow: components/subject-row.md
      - BipolarSlider: components/bipolar-slider.md
      - ChecklistItem: components/checklist-item.md
      - IconBadge: components/icon-badge.md
      - AISuggestionCard: components/ai-suggestion-card.md
      - PullQuote: components/pull-quote.md
      - EditorialHero: components/editorial-hero.md
      - SectionNumeral: components/section-numeral.md
      - ChatMessage: components/chat-message.md
      - ChatComposer: components/chat-composer.md
      - SubjectCard: components/subject-card.md
      - ApproveBar: components/approve-bar.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

hooks:
  - docs/hooks/ensure_wasm.py

exclude_docs: |
  hooks/

