name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen
      QT_LOGGING_RULES: "qt.qpa.*=false"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync
        run: uv sync --all-extras --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest

      - name: QML smoke
        run: |
          uv run python -c "
          import sys
          from PySide6.QtCore import QCoreApplication
          from PySide6.QtQml import QQmlApplicationEngine
          import pearl_kit
          app = QCoreApplication(sys.argv)
          eng = QQmlApplicationEngine()
          pearl_kit.register_qml(eng)
          eng.loadData(b'import QtQuick; import PearlKit 1.0 as P; QtObject { property color c: P.Tokens.background }')
          assert eng.rootObjects(), 'QML load failed'
          print('pearl_kit', pearl_kit.__version__, 'OK')
          "
