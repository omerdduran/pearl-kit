<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=0">
<title>pearl-kit demo</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent; overflow: hidden;
    position: relative;
  }
  body { font: 14px -apple-system, "SF Pro Display", Inter, system-ui, sans-serif; color: #9AACC4; }
  #screen {
    position: absolute; top: 0; left: 0;
    width: 100vw; height: 100vh;
    display: block;
  }
  #loader  {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
    background: #141822;
  }
  #loader .spin {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid rgba(154,172,196,0.25);
    border-top-color: #4B92FF;
    animation: pk-spin 1s linear infinite;
  }
  #loader .msg { font-size: 13px; color: #9AACC4; }
  @keyframes pk-spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div id="screen"></div>
  <div id="loader"><div class="spin"></div><div class="msg" id="msg">Loading pearl-kit demo...</div></div>

  <script src="pearl_kit_gallery.js"></script>
  <script src="qtloader.js"></script>
  <script>
    (async () => {
      const loader = document.getElementById('loader');
      const screen = document.getElementById('screen');
      const msg    = document.getElementById('msg');

      // Route ?demo=<slug> to main() as argv[1]. Qt's qtLoad forwards `arguments`
      // into Emscripten, which wires them into argc/argv for C++ main(). No
      // ccall bridge required.
      const demoKey = new URLSearchParams(location.search).get('demo') || '';
      const args = demoKey ? [demoKey] : [];

      try {
        await qtLoad({
          arguments: args,
          qt: {
            entryFunction: window.createQtAppInstance,
            containerElements: [screen],
            onLoaded: () => { loader.style.display = 'none'; },
            onExit: (exitData) => {
              loader.style.display = 'flex';
              msg.textContent = 'pearl-kit demo stopped'
                + (exitData && exitData.code !== undefined ? ` (code ${exitData.code})` : '');
            },
          },
        });
      } catch (e) {
        console.error('pearl-kit: qtLoad failed', e);
        msg.textContent = 'pearl-kit demo failed to load — check the browser console.';
      }
    })();
  </script>
</body>
</html>
